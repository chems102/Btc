<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ChemsCrypt Pro v2</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            color: #fff;
        }
        .container {
            max-width: 800px;
            margin: auto;
            padding: 20px;
            border-radius: 15px;
            background: rgba(255, 255, 255, 0.1);
        }
        input, button {
            padding: 10px;
            width: 100%;
            border: none;
            border-radius: 5px;
            margin-top: 10px;
        }
        button {
            background-color: #007BFF;
            color: white;
            cursor: pointer;
        }
        button:hover {
            background-color: #0056b3;
        }
        .notification {
            display: none;
            padding: 10px;
            background: #28a745;
            color: white;
            margin-top: 10px;
            border-radius: 5px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>ChemsCrypt Pro v2</h1>
        <input type="text" id="input" placeholder="Enter data to encrypt" />
        <button id="encrypt-btn">Encrypt</button>
        <div class="notification" id="notification">Encryption successful!</div>
    </div>

    <script>
        // Session persistence
        document.addEventListener('DOMContentLoaded', () => {
            const savedInput = localStorage.getItem('dataInput');
            if (savedInput) {
                document.getElementById('input').value = savedInput;
            }

            document.getElementById('input').addEventListener('input', (e) => {
                localStorage.setItem('dataInput', e.target.value);
            });
        });

        // Web Worker
        if (window.Worker) {
            const worker = new Worker('worker.js');

            document.getElementById('encrypt-btn').addEventListener('click', () => {
                const inputData = document.getElementById('input').value;
                worker.postMessage(inputData);
            });

            worker.onmessage = (e) => {
                showNotification(e.data);
            };

            worker.onerror = function(error) {
                console.error('Error in worker:', error);
                alert('An error occurred while processing your request.');
            };
        }

        // Notification system
        function showNotification(message) {
            const notification = document.getElementById('notification');
            notification.textContent = message;
            notification.style.display = 'block';
            setTimeout(() => {
                notification.style.display = 'none';
            }, 3000);
        }
    </script>
</body>
</html>
