<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Brainwallet Pro</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Orbitron:wght@400;700;900&family=Rajdhani:wght@300;500;700&display=swap');
:root{
  --bg:#050508;--panel:#0a0a12;--panel2:#0d0d18;--border:#16162a;
  --accent:#f7931a;--accent2:#00d4aa;--text:#c8c8d8;--muted:#44446a;
  --green:#00ff88;--red:#ff3355;--purple:#bb99ff;--yellow:#ffd700;
  --pink:#ff66bb;--blue:#44aaff;--doge:#c2a633;
}
*{box-sizing:border-box;margin:0;padding:0;}
html{scroll-behavior:smooth;}
body{background:var(--bg);color:var(--text);font-family:'Rajdhani',sans-serif;min-height:100vh;overflow-x:hidden;}
body::before{content:'';position:fixed;inset:0;background:
  radial-gradient(ellipse 80% 50% at 20% -10%,rgba(247,147,26,0.06),transparent),
  radial-gradient(ellipse 60% 40% at 80% 110%,rgba(0,212,170,0.04),transparent);
  pointer-events:none;z-index:0;}
body::after{content:'';position:fixed;inset:0;background-image:
  linear-gradient(rgba(247,147,26,0.015)1px,transparent 1px),
  linear-gradient(90deg,rgba(247,147,26,0.015)1px,transparent 1px);
  background-size:50px 50px;pointer-events:none;z-index:0;}
.wrap{position:relative;z-index:1;max-width:1200px;margin:0 auto;padding:20px 12px;}

/* HEADER */
header{text-align:center;padding:30px 0 24px;}
.logo-row{display:flex;align-items:center;justify-content:center;gap:12px;margin-bottom:8px;}
.hex-icon{font-size:24px;color:var(--accent);}
.logo-text{font-family:'Share Tech Mono',monospace;font-size:10px;letter-spacing:6px;color:var(--accent);text-transform:uppercase;}
h1{font-family:'Orbitron',sans-serif;font-size:clamp(28px,6vw,48px);font-weight:900;
  background:linear-gradient(135deg,var(--accent) 0%,#ffb347 40%,var(--accent2) 100%);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;letter-spacing:3px;line-height:1.1;}
.subtitle{color:var(--muted);font-size:11px;margin-top:6px;font-family:'Share Tech Mono',monospace;letter-spacing:1px;}
.warn-bar{background:rgba(255,51,85,0.08);border:1px solid rgba(255,51,85,0.2);
  color:#ff7788;padding:8px 16px;font-size:10px;font-family:'Share Tech Mono',monospace;
  text-align:center;letter-spacing:1px;margin-bottom:20px;}

/* GITHUB NOTICE */
.gh-notice{background:rgba(0,212,170,0.06);border:1px solid rgba(0,212,170,0.2);
  padding:10px 16px;margin-bottom:20px;display:flex;align-items:center;gap:10px;flex-wrap:wrap;}
.gh-notice span{font-family:'Share Tech Mono',monospace;font-size:10px;color:var(--accent2);}
.gh-notice a{color:var(--accent);font-family:'Share Tech Mono',monospace;font-size:10px;
  text-decoration:none;border-bottom:1px dashed var(--accent);}

/* TABS */
.tabs{display:flex;gap:2px;margin-bottom:20px;border-bottom:1px solid var(--border);overflow-x:auto;}
.tab{background:none;border:none;border-bottom:2px solid transparent;color:var(--muted);
  font-family:'Share Tech Mono',monospace;font-size:10px;letter-spacing:2px;padding:10px 18px;
  cursor:pointer;transition:all 0.2s;text-transform:uppercase;white-space:nowrap;margin-bottom:-1px;}
.tab:hover{color:var(--text);}
.tab.active{color:var(--accent);border-bottom-color:var(--accent);}
.tab-content{display:none;}
.tab-content.active{display:block;}

/* INPUTS */
.card{background:var(--panel);border:1px solid var(--border);padding:16px;margin-bottom:14px;}
.card-label{font-family:'Share Tech Mono',monospace;font-size:9px;color:var(--accent2);
  letter-spacing:3px;margin-bottom:10px;text-transform:uppercase;}
.row{display:flex;gap:8px;align-items:stretch;flex-wrap:wrap;}
.inp{flex:1;min-width:200px;background:#05050a;border:1px solid var(--border);color:var(--accent);
  font-family:'Share Tech Mono',monospace;font-size:13px;padding:10px 12px;outline:none;direction:ltr;}
.inp:focus{border-color:var(--accent2);}
.inp::placeholder{color:var(--muted);font-size:11px;}
.inp-salt{border-color:rgba(187,153,255,0.3);color:var(--purple);}
.inp-salt:focus{border-color:var(--purple);}

/* SALT CONFIG */
.salt-row{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-top:8px;}
@media(max-width:600px){.salt-row{grid-template-columns:1fr;}}
.salt-opt{background:#05050a;border:1px solid var(--border);padding:8px 12px;cursor:pointer;
  font-family:'Share Tech Mono',monospace;font-size:9px;color:var(--muted);letter-spacing:1px;
  transition:all 0.15s;text-align:center;}
.salt-opt:hover{border-color:var(--purple);color:var(--purple);}
.salt-opt.active{border-color:var(--purple);color:var(--purple);background:rgba(187,153,255,0.05);}

/* COIN SELECTOR */
.coin-row{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:12px;}
.coin-btn{background:#05050a;border:1px solid var(--border);padding:6px 14px;cursor:pointer;
  font-family:'Share Tech Mono',monospace;font-size:10px;color:var(--muted);letter-spacing:1px;
  transition:all 0.15s;}
.coin-btn:hover{border-color:var(--accent);color:var(--accent);}
.coin-btn.active{font-weight:bold;}
.coin-BTC.active{border-color:var(--accent);color:var(--accent);background:rgba(247,147,26,0.06);}
.coin-DOGE.active{border-color:var(--doge);color:var(--doge);background:rgba(194,166,51,0.06);}
.coin-LTC.active{border-color:#aaa;color:#ccc;background:rgba(200,200,200,0.04);}

/* BUTTONS */
.btn{background:transparent;border:1px solid var(--accent);color:var(--accent);
  font-family:'Share Tech Mono',monospace;font-size:10px;padding:10px 18px;cursor:pointer;
  letter-spacing:2px;transition:all 0.2s;text-transform:uppercase;white-space:nowrap;}
.btn:hover{background:var(--accent);color:#000;}
.btn:active{transform:scale(0.97);}
.btn-green{border-color:var(--green);color:var(--green);}
.btn-green:hover{background:var(--green);color:#000;}
.btn-purple{border-color:var(--purple);color:var(--purple);}
.btn-purple:hover{background:var(--purple);color:#000;}
.btn-muted{border-color:var(--muted);color:var(--muted);font-size:9px;}
.btn-muted:hover{background:var(--muted);color:#000;}
.btn-doge{border-color:var(--doge);color:var(--doge);}
.btn-doge:hover{background:var(--doge);color:#000;}
.btn-row{display:flex;gap:6px;margin-top:10px;flex-wrap:wrap;}

/* RESULT CARD */
.result-card{display:none;border:1px solid var(--accent);margin-top:14px;}
.result-card.show{display:block;}
.result-hdr{background:rgba(247,147,26,0.06);padding:8px 14px;
  font-family:'Share Tech Mono',monospace;font-size:9px;color:var(--accent);
  letter-spacing:3px;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:6px;}
.ssep{padding:6px 14px;font-family:'Share Tech Mono',monospace;font-size:8px;
  letter-spacing:3px;text-transform:uppercase;border-top:1px solid var(--border);border-bottom:1px solid var(--border);}
.ssep-key{background:rgba(144,170,187,0.03);color:#6688aa;}
.ssep-u  {background:rgba(255,215,0,0.04);color:var(--yellow);}
.ssep-c  {background:rgba(0,212,170,0.03);color:var(--accent2);}
.ssep-p2sh{background:rgba(255,102,187,0.04);color:var(--pink);}
.ssep-sw {background:rgba(187,153,255,0.04);color:var(--purple);}
.ssep-salt{background:rgba(187,153,255,0.06);color:var(--purple);}
.ssep-doge{background:rgba(194,166,51,0.06);color:var(--doge);}

.rrow{display:grid;grid-template-columns:180px 1fr auto;align-items:start;
  gap:8px;padding:10px 14px;border-bottom:1px solid #0a0a14;background:#05050a;}
.rrow:last-child{border-bottom:none;}
.rlbl{font-family:'Share Tech Mono',monospace;font-size:8px;color:var(--muted);
  letter-spacing:2px;text-transform:uppercase;padding-top:2px;white-space:nowrap;line-height:1.4;}
.rlbl small{display:block;color:#1e1e30;font-size:7px;margin-top:1px;}
.rval{font-family:'Share Tech Mono',monospace;font-size:11px;
  word-break:break-all !important;overflow-wrap:anywhere !important;
  white-space:pre-wrap !important;min-width:0;line-height:1.8;}
.ract{display:flex;flex-direction:column;gap:4px;flex-shrink:0;}

.c-key{color:#7799aa;} .c-salt{color:var(--purple);} .c-phrase{color:var(--accent);font-size:13px;font-weight:bold;}
.c-wu{color:var(--yellow);} .c-pu{color:#667788;} .c-au{color:var(--yellow);}
.c-wc{color:#99aabb;} .c-pc{color:#8899bb;} .c-p2pkh{color:var(--accent2);}
.c-p2sh{color:var(--pink);} .c-sw{color:var(--purple);}
.c-doge{color:var(--doge);}

/* COPY BTN */
.cbtn{background:none;border:1px solid var(--muted);color:var(--muted);
  font-size:8px;padding:3px 6px;cursor:pointer;font-family:'Share Tech Mono',monospace;
  transition:all 0.15s;white-space:nowrap;}
.cbtn:hover{border-color:var(--accent2);color:var(--accent2);}
.cbtn.ok{border-color:var(--green);color:var(--green);}

/* EXPLORER LINK */
.xlink{display:block;margin-top:3px;font-family:'Share Tech Mono',monospace;font-size:8px;
  text-decoration:none;border-bottom:1px dashed;opacity:0.7;transition:opacity 0.15s;white-space:nowrap;}
.xlink:hover{opacity:1;}
.xl-y{color:var(--yellow);border-color:rgba(255,215,0,0.3);}
.xl-g{color:var(--accent2);border-color:rgba(0,212,170,0.3);}
.xl-p{color:var(--pink);border-color:rgba(255,102,187,0.3);}
.xl-v{color:var(--purple);border-color:rgba(187,153,255,0.3);}
.xl-d{color:var(--doge);border-color:rgba(194,166,51,0.3);}

/* BALANCE BADGES */
.bal{display:inline-block;font-family:'Share Tech Mono',monospace;font-size:9px;
  padding:3px 8px;border:1px solid;margin-top:3px;line-height:1.6;}
.bal-spin{color:var(--muted);border-color:var(--muted);animation:pulse 1s infinite;}
.bal-zero{color:#223322;border-color:#112211;}
.bal-used{color:#997722;border-color:#664411;background:rgba(150,100,20,0.06);}
.bal-found{color:var(--green);border-color:var(--green);background:rgba(0,255,136,0.06);font-weight:bold;}
.bal-err{color:#664422;border-color:#443322;font-size:8px;}
@keyframes pulse{0%,100%{opacity:0.3;}50%{opacity:1;}}

/* SPINNING */
.spin{display:inline-block;animation:spinning 0.8s linear infinite;}
@keyframes spinning{to{transform:rotate(360deg);}}

/* BULK */
textarea{width:100%;background:#05050a;border:1px solid var(--border);color:var(--accent);
  font-family:'Share Tech Mono',monospace;font-size:12px;padding:10px;resize:vertical;
  min-height:100px;outline:none;direction:ltr;}
textarea:focus{border-color:var(--accent2);}
textarea::placeholder{color:var(--muted);}

#pbar{display:none;background:var(--border);height:2px;margin-bottom:14px;overflow:hidden;}
#pfill{height:100%;background:linear-gradient(90deg,var(--accent),var(--accent2));width:0%;transition:width 0.1s;}

.blist{display:flex;flex-direction:column;gap:8px;}
.bcard{border:1px solid var(--border);}
.bcard-hdr{background:rgba(247,147,26,0.04);padding:7px 12px;
  display:flex;justify-content:space-between;align-items:center;
  border-bottom:1px solid var(--border);flex-wrap:wrap;gap:6px;}
.bcard-phrase{font-family:'Share Tech Mono',monospace;font-size:12px;color:var(--accent);font-weight:bold;}
.bcard-num{font-family:'Share Tech Mono',monospace;font-size:9px;color:var(--muted);}
.brow{display:grid;grid-template-columns:170px 1fr auto;align-items:start;
  gap:8px;padding:8px 12px;border-bottom:1px solid #080812;background:#05050a;}
.brow:last-child{border-bottom:none;}
.blbl{font-family:'Share Tech Mono',monospace;font-size:8px;color:var(--muted);letter-spacing:2px;text-transform:uppercase;white-space:nowrap;}
.blbl small{display:block;color:#181828;font-size:7px;}
.bval{font-family:'Share Tech Mono',monospace;font-size:10px;
  word-break:break-all !important;overflow-wrap:anywhere !important;white-space:pre-wrap !important;min-width:0;line-height:1.7;}
.bsep{padding:4px 12px;font-family:'Share Tech Mono',monospace;font-size:7px;
  letter-spacing:3px;text-transform:uppercase;border-top:1px solid var(--border);border-bottom:1px solid var(--border);}
.bbal-section{padding:8px 12px;background:#030306;border-top:1px solid var(--border);}

/* STATS */
.stats{display:flex;gap:10px;margin-top:14px;flex-wrap:wrap;justify-content:center;}
.sbox{background:var(--panel);border:1px solid var(--border);padding:10px 18px;text-align:center;min-width:100px;}
.snum{font-size:22px;font-weight:700;color:var(--accent);font-family:'Share Tech Mono',monospace;}
.slbl{font-size:8px;color:var(--muted);letter-spacing:2px;text-transform:uppercase;margin-top:2px;}

/* HEX CONVERTER TAB */
.conv-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
@media(max-width:600px){.conv-grid{grid-template-columns:1fr;}}
.conv-box{background:var(--panel);border:1px solid var(--border);padding:14px;}
.conv-label{font-family:'Share Tech Mono',monospace;font-size:9px;color:var(--accent2);letter-spacing:2px;margin-bottom:8px;}
.conv-out{background:#05050a;border:1px solid var(--border);padding:10px;
  font-family:'Share Tech Mono',monospace;font-size:10px;color:var(--green);
  word-break:break-all;min-height:40px;margin-top:8px;direction:ltr;}

@media(max-width:600px){
  .rrow{grid-template-columns:1fr auto;}
  .rlbl{display:none;}
  .brow{grid-template-columns:1fr auto;}
  .blbl{display:none;}
}
</style>
</head>
<body>
<div class="wrap">

<header>
  <div class="logo-row">
    <span class="hex-icon">⬡</span>
    <span class="logo-text">Bitcoin · Dogecoin · Litecoin</span>
    <span class="hex-icon">⬡</span>
  </div>
  <h1>BRAINWALLET PRO</h1>
  <div class="subtitle">SHA-256 + SALT · P2PKH · P2SH · SegWit · DOGE · LTC · فحص الرصيد</div>
</header>

<div class="warn-bar">⚠ للأغراض التعليمية فقط — كلمات مرور قصيرة غير آمنة — لا تستخدم للمحافظ الحقيقية</div>

<div class="gh-notice">
  <span>💡 لفحص الرصيد: ارفع الملف على</span>
  <a href="https://pages.github.com" target="_blank">GitHub Pages</a>
  <span>أو افتحه عبر خادم محلي — فحص الرصيد لا يعمل من file://</span>
</div>

<div class="tabs">
  <button class="tab active" onclick="switchTab('single')">⚡ تحويل فوري</button>
  <button class="tab" onclick="switchTab('bulk')">📋 قائمة</button>
  <button class="tab" onclick="switchTab('converter')">🔄 محول المفاتيح</button>
  <button class="tab" onclick="switchTab('bip39')">🌱 BIP-39</button>
</div>

<!-- ══════ TAB: SINGLE ══════ -->
<div class="tab-content active" id="tab-single">

  <!-- Coin selector -->
  <div class="card">
    <div class="card-label">🪙 اختر العملة</div>
    <div class="coin-row">
      <button class="coin-btn coin-BTC active" onclick="setCoin('BTC',this)">₿ Bitcoin</button>
      <button class="coin-btn coin-DOGE" onclick="setCoin('DOGE',this)">Ð Dogecoin</button>
      <button class="coin-btn coin-LTC" onclick="setCoin('LTC',this)">Ł Litecoin</button>
    </div>

    <!-- Salt config -->
    <div class="card-label" style="margin-top:12px">🧂 Salt (اختياري — يقوي الأمان)</div>
    <div class="row">
      <input type="text" class="inp inp-salt" id="salt-input" placeholder="أدخل Salt هنا (اختياري)" oninput="debounce()">
    </div>
    <div class="salt-row" style="margin-top:8px">
      <button class="salt-opt active" id="smode-none" onclick="setSaltMode('none')">بدون Salt<br><small style="color:#333">SHA256(phrase)</small></button>
      <button class="salt-opt" id="smode-prefix" onclick="setSaltMode('prefix')">Salt قبل<br><small style="color:#333">SHA256(salt+phrase)</small></button>
      <button class="salt-opt" id="smode-suffix" onclick="setSaltMode('suffix')">Salt بعد<br><small style="color:#333">SHA256(phrase+salt)</small></button>
    </div>
  </div>

  <!-- Phrase input -->
  <div class="card">
    <div class="card-label">✏ أدخل الكلمة أو العبارة</div>
    <div class="row">
      <input type="text" class="inp" id="single-input"
        placeholder="مثال: Bitcoin is awesome"
        oninput="debounce()"
        onkeydown="if(event.key==='Enter')doSingle()">
      <button class="btn" onclick="doSingle()">⚡ تحويل</button>
      <button class="btn btn-muted" onclick="clearSingle()">✕</button>
    </div>
  </div>

  <!-- Result -->
  <div class="result-card" id="single-result">
    <div class="result-hdr">
      <span id="r-coin-label">BTC WALLET</span>
      <div style="display:flex;gap:6px;align-items:center;flex-wrap:wrap">
        <button class="btn btn-green" style="padding:4px 10px;font-size:9px" onclick="checkSingleBal()">💰 فحص الرصيد</button>
        <span id="single-status"></span>
      </div>
    </div>

    <!-- Private Key -->
    <div class="ssep ssep-key">🔑 المفتاح الخاص</div>
    <div class="rrow">
      <div class="rlbl">Phrase<small>العبارة</small></div>
      <div class="rval c-phrase" id="r-phrase">—</div>
      <button class="cbtn" onclick="cp('r-phrase',this)">copy</button>
    </div>
    <div class="rrow" id="r-salt-row" style="display:none">
      <div class="rlbl">Salt<small>التمليح</small></div>
      <div class="rval c-salt" id="r-salt-val">—</div>
      <button class="cbtn" onclick="cp('r-salt-val',this)">copy</button>
    </div>
    <div class="rrow" id="r-salted-row" style="display:none">
      <div class="rlbl">Input Final<small>بعد Salt</small></div>
      <div class="rval" style="color:#556677" id="r-salted">—</div>
      <button class="cbtn" onclick="cp('r-salted',this)">copy</button>
    </div>
    <div class="rrow">
      <div class="rlbl">Private Key HEX<small>SHA256 — 64 حرف</small></div>
      <div class="rval c-key" id="r-privkey">—</div>
      <button class="cbtn" onclick="cp('r-privkey',this)">copy</button>
    </div>

    <!-- BTC sections (shown when BTC/LTC) -->
    <div id="btc-sections">
      <div class="ssep ssep-u">① Uncompressed — bitaddress.org (بدون ✓)</div>
      <div class="rrow">
        <div class="rlbl">WIF Uncomp<small>يبدأ بـ 5</small></div>
        <div class="rval c-wu" id="r-wif-u">—</div>
        <button class="cbtn" onclick="cp('r-wif-u',this)">copy</button>
      </div>
      <div class="rrow">
        <div class="rlbl">Public Key<small>130 حرف — 04...</small></div>
        <div class="rval c-pu" id="r-pub-u">—</div>
        <button class="cbtn" onclick="cp('r-pub-u',this)">copy</button>
      </div>
      <div class="rrow">
        <div class="rlbl">P2PKH Uncomp<small>يبدأ بـ 1</small></div>
        <div class="rval c-au" id="r-addr-u">—<br><span id="bal-u" class="bal" style="display:none"></span></div>
        <div class="ract">
          <button class="cbtn" onclick="cp('r-addr-u',this)">copy</button>
          <a id="lnk-u" href="#" target="_blank" class="xlink xl-y">🔍 explorer</a>
        </div>
      </div>

      <div class="ssep ssep-c">② P2PKH Compressed — bitaddress.org (مع ✓)</div>
      <div class="rrow">
        <div class="rlbl">WIF Comp<small>يبدأ بـ K/L</small></div>
        <div class="rval c-wc" id="r-wif-c">—</div>
        <button class="cbtn" onclick="cp('r-wif-c',this)">copy</button>
      </div>
      <div class="rrow">
        <div class="rlbl">Public Key<small>66 حرف — 02/03...</small></div>
        <div class="rval c-pc" id="r-pub-c">—</div>
        <button class="cbtn" onclick="cp('r-pub-c',this)">copy</button>
      </div>
      <div class="rrow">
        <div class="rlbl">P2PKH Comp<small>يبدأ بـ 1</small></div>
        <div class="rval c-p2pkh" id="r-p2pkh">—<br><span id="bal-c" class="bal" style="display:none"></span></div>
        <div class="ract">
          <button class="cbtn" onclick="cp('r-p2pkh',this)">copy</button>
          <a id="lnk-c" href="#" target="_blank" class="xlink xl-g">🔍 explorer</a>
        </div>
      </div>

      <div class="ssep ssep-p2sh">③ P2SH-P2WPKH — SegWit Wrapped (يبدأ بـ 3)</div>
      <div class="rrow">
        <div class="rlbl">P2SH-P2WPKH<small>يبدأ بـ 3</small></div>
        <div class="rval c-p2sh" id="r-p2sh">—<br><span id="bal-p" class="bal" style="display:none"></span></div>
        <div class="ract">
          <button class="cbtn" onclick="cp('r-p2sh',this)">copy</button>
          <a id="lnk-p" href="#" target="_blank" class="xlink xl-p">🔍 explorer</a>
